# FAQ page
footer_faq: "FAQ"
faq_title: "Câu hỏi thường gặp"
faq_description: "Các câu hỏi thường gặp về chương trình xác minh nhà phát triển Android của Google và đợt phong tỏa ứng dụng sắp tới."
faq_intro: "Giải đáp những câu hỏi thường gặp về chương trình xác minh nhà phát triển Android của Google và đợt phong tỏa ứng dụng. Chúng tôi sẽ tiếp tục cập nhật trang này khi tình hình có thêm diễn biến."
faq_q_datechange: "Vì sao ngày phong tỏa lại thay đổi từ tháng 9 năm 2026 sang tháng 1 năm 2027?"
faq_a_datechange: "Ban đầu, đợt phong tỏa được cho là sẽ bắt đầu vào tháng 9 năm 2026 tại bốn quốc gia đầu tiên. Sau đó, thông tin đã được cập nhật để giới hạn đợt triển khai ban đầu chỉ trong một danh sách cụ thể các chợ ứng dụng Android, không bao gồm F-Droid. Điều này có nghĩa là việc kích hoạt vào tháng 9 sẽ KHÔNG ảnh hưởng đến bản thân F-Droid hay bất kỳ ứng dụng nào được cài đặt qua F-Droid. Ngày mà đợt phong tỏa bắt đầu tác động đến người dùng F-Droid vẫn chưa được công bố. Chúng tôi sẽ tiếp tục cập nhật trang này với mọi thông tin mới về lộ trình mà chúng tôi nhận được. Để biết thêm chi tiết, xem [Câu hỏi thường gặp về xác minh nhà phát triển của Google](https://developer.android.com/developer-verification/guides/faq#general)."
